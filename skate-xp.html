<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skate XP</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.85);
    color:white;
    padding:15px;
    border-radius:10px;
    width:280px;
}

button{
    width:100%;
    margin-top:5px;
    padding:8px;
    cursor:pointer;
}

h2{
    margin:0 0 10px;
}

#message{
    color:gold;
    font-weight:bold;
    min-height:20px;
}
</style>
</head>
<body>

<div id="ui">

<h2>🛹 Skate XP</h2>

Money: $<span id="money">0</span><br>
Level: <span id="level">1</span><br>
XP: <span id="xp">0</span>/<span id="nextXP">100</span><br>
Board: <span id="board">Starter Board</span><br>
Combo: <span id="combo">0</span><br>
Lifetime Tricks: <span id="tricks">0</span><br>

<hr>

<h3>Shop</h3>

<button onclick="buyBoard(1)">
Street Board ($250)
</button>

<button onclick="buyBoard(2)">
Pro Board ($1000)
</button>

<button onclick="buyBoard(3)">
Legend Board ($5000)
</button>

<button onclick="resetSave()">
Reset Save
</button>

<hr>

<b>Controls</b><br>
W = Accelerate<br>
A = Left<br>
D = Right<br>
Space = Jump<br>
Q = Kickflip<br>
E = Heelflip<br>
R = 360 Spin

<br><br>

<div id="message"></div>

</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let money = 0;
let level = 1;
let xp = 0;
let nextXP = 100;
let combo = 0;
let lifetimeTricks = 0;

let boardName = "Starter Board";
let boardMultiplier = 1;

function saveGame(){

    localStorage.setItem(
        "skateXPsave",
        JSON.stringify({
            money,
            level,
            xp,
            nextXP,
            boardName,
            boardMultiplier,
            lifetimeTricks
        })
    );
}

function loadGame(){

    const save =
    localStorage.getItem("skateXPsave");

    if(!save) return;

    const data = JSON.parse(save);

    money = data.money || 0;
    level = data.level || 1;
    xp = data.xp || 0;
    nextXP = data.nextXP || 100;

    boardName =
    data.boardName ||
    "Starter Board";

    boardMultiplier =
    data.boardMultiplier || 1;

    lifetimeTricks =
    data.lifetimeTricks || 0;
}

function resetSave(){

    if(confirm("Delete save?")){

        localStorage.removeItem(
            "skateXPsave"
        );

        location.reload();
    }
}

loadGame();

function showMessage(text){

    document.getElementById(
        "message"
    ).textContent = text;

    setTimeout(()=>{
        document.getElementById(
            "message"
        ).textContent = "";
    },2000);
}

function addXP(amount){

    xp += amount;

    while(xp >= nextXP){

        xp -= nextXP;

        level++;

        nextXP =
        Math.floor(nextXP * 1.35);

        showMessage(
            "LEVEL UP! Level " +
            level
        );
    }
}

function buyBoard(type){

    if(type===1 && money>=250){

        money-=250;

        boardMultiplier=2;

        boardName=
        "Street Board";

        showMessage(
            "Bought Street Board"
        );
    }

    if(type===2 && money>=1000){

        money-=1000;

        boardMultiplier=4;

        boardName=
        "Pro Board";

        showMessage(
            "Bought Pro Board"
        );
    }

    if(type===3 && money>=5000){

        money-=5000;

        boardMultiplier=8;

        boardName=
        "Legend Board";

        showMessage(
            "Bought Legend Board"
        );
    }

    saveGame();
}

const keys = {};

document.addEventListener(
"keydown",
e=>{

    keys[e.key.toLowerCase()] = true;

    if(
        e.code==="Space" &&
        player.grounded
    ){
        player.vy=-14;
        player.grounded=false;
    }

    if(!player.grounded){

        if(e.key==="q"){

            combo +=
            100*boardMultiplier;

            lifetimeTricks++;

            addXP(25);

            showMessage(
            "Kickflip!"
            );
        }

        if(e.key==="e"){

            combo +=
            150*boardMultiplier;

            lifetimeTricks++;

            addXP(40);

            showMessage(
            "Heelflip!"
            );
        }

        if(e.key==="r"){

            combo +=
            250*boardMultiplier;

            lifetimeTricks++;

            addXP(75);

            showMessage(
            "360 Spin!"
            );
        }

    }

});

document.addEventListener(
"keyup",
e=>{
keys[e.key.toLowerCase()] = false;
});

const player = {
x:200,
y:500,
w:40,
h:20,
vx:0,
vy:0,
grounded:true
};

let cameraX=0;

const ramps=[];

for(let i=0;i<25;i++){

ramps.push({
x:700+(i*500),
y:350+Math.random()*150,
w:250,
h:180
});

}

function update(){

if(keys["w"]){

player.vx +=
0.25*boardMultiplier;
}

if(keys["a"]){

player.vx -= 0.15;
}

if(keys["d"]){

player.vx += 0.15;
}

player.vx *= .99;

player.x += player.vx;

player.vy += .65;

player.y += player.vy;

let ground = 600;

ramps.forEach(r=>{

if(
player.x+player.w>r.x &&
player.x<r.x+r.w
){

const p=
(player.x-r.x)/r.w;

const ramp=
r.y+r.h-(p*r.h);

if(
player.y+player.h>
ramp
){

ground =
Math.min(
ground,
ramp-player.h
);

}

}

});

if(player.y>ground){

if(!player.grounded){

money += combo;

if(combo>0){

showMessage(
"Landed +$"+
combo
);

}

combo=0;
}

player.y=ground;

player.vy=0;

player.grounded=true;
}

cameraX =
player.x-(canvas.width/3);

document.getElementById(
"money"
).textContent =
Math.floor(money);

document.getElementById(
"level"
).textContent =
level;

document.getElementById(
"xp"
).textContent =
xp;

document.getElementById(
"nextXP"
).textContent =
nextXP;

document.getElementById(
"board"
).textContent =
boardName;

document.getElementById(
"combo"
).textContent =
combo;

document.getElementById(
"tricks"
).textContent =
lifetimeTricks;
}

function draw(){

ctx.fillStyle="#87ceeb";
ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.save();

ctx.translate(
-cameraX,
0
);

ctx.fillStyle="#3a9f3a";

ctx.fillRect(
-5000,
620,
100000,
1000
);

ramps.forEach(r=>{

ctx.fillStyle="#666";

ctx.beginPath();

ctx.moveTo(
r.x,
r.y+r.h
);

ctx.lineTo(
r.x+r.w,
r.y+r.h
);

ctx.lineTo(
r.x+r.w,
r.y
);

ctx.closePath();

ctx.fill();

});

ctx.fillStyle="black";

ctx.fillRect(
player.x,
player.y,
player.w,
player.h
);

ctx.fillStyle="red";

ctx.fillRect(
player.x-5,
player.y+15,
50,
8
);

ctx.restore();
}

function loop(){

update();

draw();

requestAnimationFrame(
loop
);
}

setInterval(
saveGame,
5000
);

loop();

</script>

</body>
</html>
