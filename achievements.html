<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skater Achievements</title>

<style>
body{
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:3px solid gold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.stats{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:15px;
}

.achievement{
    background:#2d2d2d;
    border:3px solid #444;
    border-radius:12px;
    padding:15px;
    transition:.2s;
}

.unlocked{
    border-color:gold;
    background:#3d3310;
}

.locked{
    opacity:.6;
}

.icon{
    font-size:40px;
}

.title{
    font-size:20px;
    margin-top:10px;
    font-weight:bold;
}

.desc{
    margin-top:5px;
    color:#ccc;
}

.status{
    margin-top:10px;
    font-weight:bold;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
}

#progress{
    margin-top:10px;
    font-size:18px;
}
</style>
</head>
<body>

<header>
<h1>🏆 Skater Achievements</h1>
</header>

<div class="container">

<div class="stats">
<h2>Achievement Progress</h2>

Unlocked:
<span id="unlockedCount">0</span> /
<span id="totalCount">0</span>

<div id="progress"></div>

<br>

<button onclick="unlockTestData()">
Unlock Demo Progress
</button>

<button onclick="resetAchievements()">
Reset Achievements
</button>
</div>

<div id="achievementGrid" class="grid"></div>

</div>

<script>

const achievements = [

{
id:"first_trick",
icon:"🛹",
title:"First Trick",
desc:"Land your first trick",
condition:p=>p.tricks>=1
},

{
id:"trick_100",
icon:"🔥",
title:"Trick Master",
desc:"Land 100 tricks",
condition:p=>p.tricks>=100
},

{
id:"money_1000",
icon:"💰",
title:"Pocket Change",
desc:"Earn $1,000",
condition:p=>p.money>=1000
},

{
id:"money_10000",
icon:"💵",
title:"Rich Skater",
desc:"Earn $10,000",
condition:p=>p.money>=10000
},

{
id:"combo_1000",
icon:"⚡",
title:"Combo Rookie",
desc:"Reach a 1,000 combo",
condition:p=>p.highestCombo>=1000
},

{
id:"combo_5000",
icon:"🌪️",
title:"Combo Legend",
desc:"Reach a 5,000 combo",
condition:p=>p.highestCombo>=5000
},

{
id:"level_5",
icon:"⭐",
title:"Level 5",
desc:"Reach level 5",
condition:p=>p.level>=5
},

{
id:"level_25",
icon:"🌟",
title:"Level 25",
desc:"Reach level 25",
condition:p=>p.level>=25
},

{
id:"legend_board",
icon:"👑",
title:"Legend Rider",
desc:"Own a Legend Board",
condition:p=>p.board==="Legend Board"
},

{
id:"millionaire",
icon:"💎",
title:"Millionaire",
desc:"Earn $1,000,000",
condition:p=>p.money>=1000000
}

];

function getPlayerData(){

const profile =
JSON.parse(
localStorage.getItem("skaterProfile")
) || {};

return {

level:profile.level || 1,
money:profile.money || 0,
tricks:profile.tricks || 0,
highestCombo:
profile.highestCombo || 0,
board:
profile.board || "Starter Board"

};

}

function renderAchievements(){

const player = getPlayerData();

const grid =
document.getElementById(
"achievementGrid"
);

grid.innerHTML="";

let unlocked = 0;

achievements.forEach(a=>{

const earned =
a.condition(player);

if(earned) unlocked++;

const div =
document.createElement("div");

div.className =
"achievement " +
(earned
? "unlocked"
: "locked");

div.innerHTML = `

<div class="icon">
${a.icon}
</div>

<div class="title">
${a.title}
</div>

<div class="desc">
${a.desc}
</div>

<div class="status">
${earned
? "✅ Unlocked"
: "🔒 Locked"}
</div>

`;

grid.appendChild(div);

});

document.getElementById(
"unlockedCount"
).textContent = unlocked;

document.getElementById(
"totalCount"
).textContent =
achievements.length;

const percent =
Math.floor(
(unlocked /
achievements.length)
*100
);

document.getElementById(
"progress"
).textContent =
percent +
"% Complete";
}

function unlockTestData(){

const profile =
JSON.parse(
localStorage.getItem(
"skaterProfile"
)
) || {};

profile.level = 30;
profile.money = 25000;
profile.tricks = 250;
profile.highestCombo = 6000;
profile.board = "Legend Board";

localStorage.setItem(
"skaterProfile",
JSON.stringify(profile)
);

renderAchievements();
}

function resetAchievements(){

if(confirm(
"Reset profile progress?"
)){

localStorage.removeItem(
"skaterProfile"
);

renderAchievements();
}
}

renderAchievements();

</script>

</body>
</html>
