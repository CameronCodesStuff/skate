<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skate XP — Achievements</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-logo">SKATE XP</div>
  <a href="index.html">▶ PLAY</a>
  <a href="profile.html">PROFILE</a>
  <a href="achievements.html" class="active">ACHIEVEMENTS</a>
</nav>

<div id="toast"></div>

<div class="ach-page">

  <div class="ach-header">
    <div>
      <h1>ACHIEVEMENTS</h1>
      <div style="color:var(--text-dim);font-size:12px;margin-top:4px">
        <span id="ach-unlocked-count">0</span> / <span id="ach-total-count">0</span> unlocked
        &nbsp;·&nbsp; <span id="ach-pct">0% complete</span>
      </div>
      <div class="progress-bar-wrap" style="margin-top:10px">
        <div class="progress-bar-fill" id="ach-progress-bar" style="width:0%"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-cyan" id="demo-data-btn">DEMO UNLOCK</button>
      <button class="btn btn-ghost" id="reset-ach-btn">RESET</button>
    </div>
  </div>

  <div class="ach-grid" id="ach-grid"></div>

</div>

<script src="game.js"></script>
